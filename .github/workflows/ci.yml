name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libboost-all-dev libssl-dev \
            libspdlog-dev libyaml-cpp-dev \
            libsimdjson-dev nlohmann-json3-dev \
            libgtest-dev libgmock-dev

      - name: Configure (Debug + Tests)
        run: cmake --preset debug

      - name: Build
        run: cmake --build build/debug --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build/debug --output-on-failure

  benchmark:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libboost-all-dev libssl-dev \
            libspdlog-dev libyaml-cpp-dev \
            libsimdjson-dev nlohmann-json3-dev \
            libbenchmark-dev

      - name: Configure (Bench)
        run: cmake --preset bench

      - name: Build benchmarks
        run: cmake --build build/bench --parallel $(nproc)

      - name: Run benchmarks
        run: |
          mkdir -p bench/results
          for bench in bench_json_parse bench_queue bench_orderbook bench_e2e; do
            echo "========================================"
            echo "Running: $bench"
            echo "========================================"
            ./build/bench/$bench \
              --benchmark_format=console \
              --benchmark_out=bench/results/${bench}.json \
              --benchmark_out_format=json
            echo ""
          done

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench/results/

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy WebSocket to engine
    location /ws {
        proxy_pass http://engine:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Proxy metrics API to engine
    location /stats {
        proxy_pass http://engine:8080/stats;
    }

    location /health {
        proxy_pass http://engine:8080/health;
    }
}
